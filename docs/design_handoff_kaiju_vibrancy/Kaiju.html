<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Kaiju — Mac Jira client</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; -webkit-font-smoothing: antialiased; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; }
  #root { height: 100%; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="variation-vibrancy.jsx"></script>
<script type="text/babel" src="variation-mono.jsx"></script>
<script type="text/babel" src="variation-pro.jsx"></script>

<script type="text/babel" data-presets="react">
var useState = React.useState;
var useEffect = React.useEffect;

// macOS window chrome wrapper for canvas display.
function MacFrame({ width, height, children }) {
  return (
    <div style={{
      width, height, borderRadius: 12, overflow: "hidden",
      background: "#fff",
      boxShadow: "0 0 0 0.5px rgba(0,0,0,0.18), 0 32px 80px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.08)",
      position: "relative",
    }}>
      {children}
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "appearance": "auto",
  "vibrancyAccent": "#5E5CE6",
  "monoAccent": "#1F1F1F",
  "proAccent": "#0A84FF"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // appearance: "light" | "dark" | "auto" (per-variation default)
  const isDark = tweaks.appearance === "dark";

  // Each artboard sits inside MacFrame at native size so the chrome looks real.
  const W = 1280, H = 820;

  return (
    <DesignCanvas>
      <DCSection id="kaiju" title="Kaiju · Mac issue tracker"
                 subtitle="Three takes on a sleek, modern macOS Jira-style client. Drag cards between columns · ⌘K for the command palette · click any issue for the inspector.">

        <DCArtboard id="vibrancy"
                    label="01 · Translucent Vibrancy"
                    width={W} height={H}>
          <MacFrame width={W} height={H}>
            <VibrancyApp dark={tweaks.appearance === "dark"} accent={tweaks.vibrancyAccent}/>
          </MacFrame>
        </DCArtboard>

        <DCArtboard id="mono"
                    label="02 · Monochrome Minimal"
                    width={W} height={H}>
          <MacFrame width={W} height={H}>
            <MonoApp dark={tweaks.appearance === "dark"} accent={tweaks.monoAccent}/>
          </MacFrame>
        </DCArtboard>

        <DCArtboard id="pro"
                    label="03 · Pro Tool Density"
                    width={W} height={H}>
          <MacFrame width={W} height={H}>
            <ProApp dark={tweaks.appearance === "dark"} accent={tweaks.proAccent}/>
          </MacFrame>
        </DCArtboard>

      </DCSection>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Appearance">
          <TweakRadio label="Theme"
                      options={[{value: "light", label: "Light"}, {value: "dark", label: "Dark"}]}
                      value={tweaks.appearance === "dark" ? "dark" : "light"}
                      onChange={(v) => setTweak("appearance", v)}/>
        </TweakSection>
        <TweakSection title="Accent colors">
          <TweakColor label="Vibrancy" value={tweaks.vibrancyAccent} onChange={(v) => setTweak("vibrancyAccent", v)}/>
          <TweakColor label="Mono"     value={tweaks.monoAccent}     onChange={(v) => setTweak("monoAccent", v)}/>
          <TweakColor label="Pro"      value={tweaks.proAccent}      onChange={(v) => setTweak("proAccent", v)}/>
        </TweakSection>
      </TweaksPanel>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
